{% extends 'base.html' %}
{% load static %}

{% block title %}Logged Out - {{ site_name }}{% endblock %}

{% block content %}
<div class="pt-20 bg-light-gray min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl p-12 text-center" data-aos="fade-up">
            <svg class="w-20 h-20 text-gold mx-auto mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            
            <h1 class="text-3xl font-bold text-dark-gray mb-4">Successfully Logged Out</h1>
            <p class="text-gray-600 mb-8">Thank you for visiting ApexLiftStudio. We hope to see you again soon!</p>
            
            <div class="space-y-4">
                <a href="{% url 'home' %}" class="block w-full bg-gold text-dark-gray py-3 rounded-full font-bold hover:bg-yellow-500 transition duration-300">
                    Return Home
                </a>
                <a href="{% url 'login' %}" class="block w-full bg-dark-gray text-white py-3 rounded-full font-bold hover:bg-gray-800 transition duration-300">
                    Login Again
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
